        text: iPadでRustDeskを使いMacにリモート接続します。
      - startSec: 7
        endSec: 24
        text: |-
          iPhoneでclaudeを開きます。
          ※この動画ではiPhoneをMacでミラーリングしています。
      - startSec: 25
        endSec: 29
        text: ClaudeのDispatchを使います。
      - startSec: 30
        endSec: 35
        text: MacでもDispatchを開いておきましょう。
      - startSec: 36
        endSec: 41
        text: |-
          MacのなかにあるObsidian（オブシディアン）というメモファイルがあります。
          私はここにX（Twitter）の記事を溜め込んでいます。
      - startSec: 42
        endSec: 48
        text: |-
          毎日、X twitterの記事を何件か保存しています。
          あのメモの中のあの記事どこだっけ？みたいなことになりがちです。
      - startSec: 49
        endSec: 65
        text: |-
          糸井重里さんがなんか最近記事書いてたなー？なんやったっけ？
          こんなこと出先で気になったとします。
      - startSec: 66
        endSec: 105
        text: Dispatchくんに聞いてみましょう。
      - startSec: 110
        endSec: 117
        text: Macの方でもDispatchくんが同じ内容で動いてます。
      - startSec: 118
        endSec: 124
        text: |-
          Dispatchくんから返答が来ました。
          無事にiPhoneから出先で曖昧なお願いでMacのメモ情報が取れましたね。便利になりました。
      - startSec: 124
        endSec: 139
        text: |-
          このままさらにMacに作業をしてもらいましょう。
          毎日膨大な量のX Twitterの投稿を保存しています。
          二日間だけでもこれだけのメモが溜まりました。
      - startSec: 140
        endSec: 171
        text: |-
          二日間のメモの中から、Claudeについてだけの記事をリスト化して、
          投稿者・見出し・内容の要約に分けて
          Numbers（Excelのようなもの）のスプレッドシートに
          新しいファイルで作成してもらいましょう。
      - startSec: 171
        endSec: 179
        text: |-
          iPhoneからお願いしています。
          3月23日と3月22日の中から探してもらっています。
          日付表記をあえて統一せず、3月23日を先に書いてお願いしていますが、うまくいくでしょうか？
