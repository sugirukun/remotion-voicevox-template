      - startSec: 216
        endSec: 238
        text: |-
          4つ目の記事はうまくスプレッドシートに入ってますね。
          Claudeについて書かれた内容のようです。
          スプレッドシートの内容とメモの内容が一致してますね。
      - startSec: 239
        endSec: 242
        text: |-
          5つ目のメモはゲームの記事のようなので取り込めていません。
